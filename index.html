<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI：數的宇宙 | 翰林國小數學</title>
    <link rel="icon" href="images/favicon.ico">
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Google Fonts (加入科技感字體 Orbitron 與 Noto Sans TC) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Orbitron:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-space: #03040b;
            --glass-bg: rgba(13, 17, 33, 0.7);
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--dark-space);
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .font-tech { font-family: 'Orbitron', sans-serif; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* 新增彈性互動過渡效果 (Spring Animation) */
        .spring-transition {
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 動畫定義 */
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
        
        /* 彈跳進入效果，使其更具 Q 彈感 */
        @keyframes scale-in { from { transform: scale(0.85) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .animate-scale-in { animation: scale-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        @keyframes float { 
            0% { transform: translateY(0px) rotate(0deg); } 
            50% { transform: translateY(-20px) rotate(5deg); } 
            100% { transform: translateY(0px) rotate(0deg); } 
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-float-delayed { animation: float 7s ease-in-out 2s infinite; }

        /* 星空背景動畫 */
        @keyframes stars-movement {
            0% { background-position: 0 0; }
            100% { background-position: -1000px 500px; }
        }
        
        .space-bg {
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #00f3ff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #bc13fe, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: stars-movement 60s linear infinite;
        }

        /* 玻璃擬態與霓虹效果 */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        
        .neon-text-blue {
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.8), 0 0 20px rgba(0, 243, 255, 0.4);
        }
        
        .neon-border-active {
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4), inset 0 0 10px rgba(0, 243, 255, 0.2);
            border-color: var(--neon-blue);
        }

        /* 網格裝飾 */
        .cyber-grid {
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* -----------------------------------------------------------------
           科幻風 UI 按鈕專用樣式 (對齊使用者附圖的 Cyberpunk 切角面板風格) 
           ----------------------------------------------------------------- */
        .cyber-btn-wrapper {
            position: relative;
            display: block;
            width: 100%;
            padding: 2px; /* 控制邊框厚度 */
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.8), rgba(0, 243, 255, 0.1) 30%, rgba(0, 243, 255, 0.1) 70%, rgba(0, 243, 255, 0.8));
            /* 左上、右下切角 (Chamfered edge) 加上 Webkit 支援防消失 */
            -webkit-clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
            transition: all 0.3s ease;
            -webkit-transform: translateZ(0); /* 啟動硬體加速防止 iOS 破圖 */
            transform: translateZ(0);
            z-index: 20;
        }

        .cyber-btn-inner {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1.125rem 0;
            background: linear-gradient(90deg, rgba(9, 19, 43, 0.95) 0%, rgba(16, 33, 71, 0.95) 100%);
            /* 內部背景需對應外部切角 加上 Webkit 支援防消失 */
            -webkit-clip-path: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
            clip-path: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
            color: #00f3ff;
            text-transform: uppercase;
            overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }

        /* 上下的水平裝飾發光線條 */
        .cyber-btn-inner::before {
            content: '';
            position: absolute;
            top: 0; left: 15%;
            width: 40%; height: 2px;
            background: #00f3ff;
            box-shadow: 0 0 15px 2px #00f3ff;
        }
        .cyber-btn-inner::after {
            content: '';
            position: absolute;
            bottom: 0; right: 15%;
            width: 40%; height: 2px;
            background: #00f3ff;
            box-shadow: 0 0 15px 2px #00f3ff;
        }

        /* 懸停效果 (Hover) */
        .cyber-btn-wrapper:hover {
            filter: drop-shadow(0 0 10px rgba(0, 243, 255, 0.5));
        }
        .cyber-btn-wrapper:hover .cyber-btn-inner {
            background: linear-gradient(90deg, rgba(16, 33, 71, 0.95) 0%, rgba(26, 54, 115, 0.95) 100%);
            color: #ffffff;
            text-shadow: 0 0 10px #00f3ff;
            box-shadow: inset 0 0 25px rgba(0, 243, 255, 0.4);
        }

        /* 掃描光效 (Hover 時滑過按鈕) */
        .cyber-btn-sweep {
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.35), transparent);
            transform: skewX(-25deg);
            transition: left 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .cyber-btn-wrapper:hover .cyber-btn-sweep {
            left: 200%;
        }

        /* 按鈕四角的幾何三角形點綴 */
        .cyber-btn-dec-tl {
            position: absolute;
            top: 4px; left: 18px;
            width: 6px; height: 6px;
            background: #00f3ff;
            clip-path: polygon(100% 0, 100% 100%, 0 100%);
        }
        .cyber-btn-dec-br {
            position: absolute;
            bottom: 4px; right: 18px;
            width: 6px; height: 6px;
            background: #00f3ff;
            clip-path: polygon(0 0, 100% 0, 0 100%);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- HEADER 區塊 -->
    <header class="relative overflow-hidden border-b border-cyan-500/30 shadow-[0_4px_30px_rgba(0,243,255,0.15)] z-30 pt-16 pb-12">
        
        <!-- 左上角 翰林 Logo -->
        <a href="#" class="absolute top-4 left-4 md:top-6 md:left-8 z-50 spring-transition hover:scale-105 active:scale-95">
            <img src="h_logo.png" alt="翰林" class="h-7 md:h-10 w-auto drop-shadow-[0_0_10px_rgba(0,243,255,0.3)] opacity-90 hover:opacity-100 transition-opacity">
        </a>

        <!-- 背景圖層 -->
        <div class="absolute inset-0 bg-gradient-to-b from-[#080b1a] to-[#03040b] z-0"></div>
        <div class="absolute inset-0 space-bg opacity-60 z-0 pointer-events-none"></div>
        <div class="absolute inset-0 cyber-grid z-0 pointer-events-none"></div>
        
        <!-- 漂浮國小數學運算與數字符號 -->
        <div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
            <div class="absolute top-[15%] left-[10%] text-cyan-500/30 font-tech text-6xl animate-float">+</div>
            <div class="absolute bottom-[25%] left-[8%] text-purple-500/30 font-tech text-6xl animate-float-delayed">÷</div>
            <div class="absolute top-[35%] right-[12%] text-cyan-400/20 font-tech text-7xl animate-float">×</div>
            <div class="absolute bottom-[15%] right-[10%] text-purple-400/30 font-tech text-7xl animate-float-delayed">-</div>
            <div class="absolute top-[60%] left-[20%] text-blue-500/20 font-tech text-5xl animate-float">8</div>
            <div class="absolute top-[25%] right-[25%] text-indigo-500/30 font-tech text-6xl animate-float-delayed">3</div>
            <div class="absolute bottom-[40%] right-[30%] text-cyan-300/20 font-tech text-7xl animate-float">7</div>
            <div class="absolute top-[45%] left-[35%] text-purple-300/20 font-tech text-6xl animate-float-delayed">=</div>
            
            <!-- 發光星系裝飾圈 -->
            <div class="absolute top-[-50%] right-[-10%] w-[600px] h-[600px] rounded-full border border-cyan-500/10 shadow-[0_0_100px_rgba(0,243,255,0.05)] z-0"></div>
            <div class="absolute bottom-[-50%] left-[-10%] w-[500px] h-[500px] rounded-full border border-purple-500/10 shadow-[0_0_100px_rgba(188,19,254,0.05)] z-0"></div>
        </div>

        <div class="max-w-5xl mx-auto px-4 text-center relative z-10 flex flex-col items-center">
            
            <!-- 主標題 (統一字級、新增幽浮與光束投射設計) -->
            <div class="mb-6 relative flex items-center justify-center py-2 mt-4">
                <!-- 標題發光底層 -->
                <div class="absolute inset-0 bg-gradient-to-r from-cyan-500 via-blue-500 to-purple-500 blur-[40px] opacity-40 rounded-full scale-110"></div>
                
                <h1 class="relative flex items-baseline justify-center gap-2 md:gap-4 select-none">
                    <div class="relative inline-block z-10">
                        <!-- 左上角幽浮 SVG 與投射光束 -->
                        <svg class="absolute -top-12 -left-6 md:-top-16 md:-left-8 w-14 h-14 md:w-20 md:h-20 text-cyan-300 animate-float drop-shadow-[0_0_10px_rgba(0,243,255,0.8)] z-20 pointer-events-none overflow-visible" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                            <defs>
                                <linearGradient id="beam" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.6"/>
                                    <stop offset="100%" stop-color="#bc13fe" stop-opacity="0"/>
                                </linearGradient>
                            </defs>
                            <!-- 發光束 (運用 overflow-visible 延伸) -->
                            <polygon points="12,14 -10,42 34,42" fill="url(#beam)" class="animate-pulse" style="mix-blend-mode: screen;"/>
                            <!-- 飛碟本體 -->
                            <path d="M12 2a5 5 0 0 0-4.54 3.03C3.26 5.53 0 7.42 0 9c0 1.86 4.3 3.5 10 3.9v.1a2 2 0 1 0 4 0v-.1c5.7-.4 10-2.04 10-3.9 0-1.58-3.26-3.47-7.46-3.97A5 5 0 0 0 12 2zm0 2a3 3 0 0 1 2.83 2H9.17A3 3 0 0 1 12 4zm-7 7a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm7 1a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm7-1a1 1 0 1 1 0-2 1 1 0 0 1 0 2z" fill="rgba(0,243,255,0.95)"/>
                            <ellipse cx="12" cy="13" rx="7" ry="2" fill="rgba(188,19,254,0.8)" filter="blur(1px)"/>
                        </svg>
                        <span class="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-cyan-300 font-tech drop-shadow-[0_0_15px_rgba(0,243,255,0.6)] tracking-wider relative z-10">AI</span>
                    </div>
                    <span class="text-5xl md:text-7xl text-cyan-400 font-tech animate-pulse drop-shadow-[0_0_10px_rgba(0,243,255,0.8)]">:</span>
                    <span class="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-cyan-300 drop-shadow-[0_0_15px_rgba(0,243,255,0.6)] tracking-[0.1em]">
                        數的宇宙
                    </span>
                </h1>
            </div>
            
            <!-- 副標題 -->
            <div class="mt-2 flex justify-center items-center gap-4">
                <div class="h-[1px] w-16 bg-gradient-to-r from-transparent to-cyan-500"></div>
                <div class="flex items-center gap-2 bg-indigo-950/60 border border-cyan-500/40 px-6 py-2 rounded-full backdrop-blur-md shadow-[0_0_15px_rgba(0,243,255,0.2)]">
                    <i data-lucide="rocket" class="w-5 h-5 text-purple-400"></i>
                    <p class="text-cyan-100 font-bold text-lg md:text-xl tracking-widest font-tech">翰林國小數學 X Puti 老師 AI製作</p>
                </div>
                <div class="h-[1px] w-16 bg-gradient-to-l from-transparent to-cyan-500"></div>
            </div>
        </div>
    </header>

    <!-- 導覽與搜尋 -->
    <nav class="py-6 bg-[#0a0d1d]/80 backdrop-blur-md border-b border-cyan-900/50 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col lg:flex-row items-center justify-between gap-6">
                <!-- 左側：年級選單 -->
                <div class="flex flex-col md:flex-row items-center gap-4 flex-grow justify-center lg:justify-start w-full">
                    <div class="flex items-center gap-2 text-cyan-400 font-bold text-sm bg-cyan-950/50 px-3 py-1.5 rounded-full border border-cyan-800">
                        <i data-lucide="radar" class="w-4 h-4"></i>
                        <span class="whitespace-nowrap">選擇探索星域</span>
                    </div>
                    <div id="grade-buttons" class="flex flex-wrap justify-center gap-2"></div>
                </div>
                
                <!-- 右側：搜尋框 -->
                <div class="w-full max-w-xs relative group">
                    <div class="absolute -inset-0.5 bg-gradient-to-r from-cyan-500 to-purple-500 rounded-full blur opacity-20 group-focus-within:opacity-50 transition duration-500"></div>
                    <div class="relative flex items-center bg-[#050714] rounded-full border border-cyan-800/80 overflow-hidden">
                        <i data-lucide="search" class="absolute left-4 w-4 h-4 text-cyan-500 z-10"></i>
                        <input type="text" id="search-input" placeholder="搜尋主題..." class="w-full pl-11 pr-10 py-2.5 bg-transparent font-medium text-cyan-100 placeholder-cyan-700/70 focus:outline-none transition-all font-tech">
                        <button id="clear-search" class="absolute right-3 p-1 hover:bg-cyan-900/50 rounded-full z-10 hidden spring-transition active:scale-90">
                            <i data-lucide="x" class="w-4 h-4 text-cyan-400"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 搜尋結果提示 -->
            <div id="search-result-hint" class="text-center mt-6 hidden animate-fade-in">
                <p class="text-cyan-200 font-medium bg-cyan-900/30 border border-cyan-700/50 inline-flex items-center px-4 py-1.5 rounded-full text-sm">
                    <i data-lucide="target" class="w-4 h-4 mr-2 text-cyan-400"></i>
                    掃描結果：<span id="search-term-display" class="font-bold text-white mx-1"></span> 
                    <span class="mx-2 text-cyan-800">|</span> 點擊星域按鈕重置座標
                </p>
            </div>
        </div>
    </nav>

    <!-- 主要內容區 -->
    <main class="flex-grow px-4 max-w-7xl mx-auto pb-24 w-full pt-10 z-10 min-h-[50vh] relative">
        <div class="absolute inset-0 space-bg opacity-30 z-[-1] pointer-events-none hidden md:block" style="animation-direction: reverse;"></div>
        
        <div id="resources-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        
        <!-- 無資料提示 -->
        <div id="no-data-hint" class="text-center py-24 glass-panel rounded-2xl hidden mt-10">
            <div class="flex justify-center mb-4">
                <div class="relative">
                    <div class="absolute inset-0 bg-cyan-500 blur-xl opacity-20 rounded-full"></div>
                    <i data-lucide="telescope" class="w-16 h-16 text-cyan-500/50 relative z-10 animate-float"></i>
                </div>
            </div>
            <p class="text-xl font-bold text-cyan-300 mb-2" id="no-data-text">此星域目前沒有探測到資源</p>
            <p class="text-sm text-cyan-600/80">請重新調整搜尋雷達或選擇其他年級星域</p>
        </div>
    </main>

    <!-- 頁尾 -->
    <footer class="bg-[#050714] border-t border-cyan-900/50 py-8 text-center relative z-10">
        <div class="absolute inset-0 cyber-grid opacity-20 pointer-events-none z-0"></div>
        <div class="relative z-10 flex flex-col items-center justify-center">
            <i data-lucide="orbit" class="w-6 h-6 text-cyan-700 mb-2"></i>
            <p class="text-cyan-600 font-tech text-sm tracking-wider">
                &copy; <span id="current-year"></span> Hanlin 翰林出版事業股份有限公司.
            </p>
        </div>
    </footer>

    <!-- 回到頂端 -->
    <button id="scroll-to-top" class="fixed bottom-8 right-8 bg-cyan-950/80 border border-cyan-400 p-3 rounded-full shadow-[0_0_15px_rgba(0,243,255,0.3)] hover:-translate-y-2 hover:bg-cyan-900 hover:shadow-[0_0_25px_rgba(0,243,255,0.6)] text-cyan-300 spring-transition z-40 hidden backdrop-blur-sm group active:scale-90">
        <i data-lucide="arrow-up" class="w-6 h-6 group-hover:animate-bounce"></i>
    </button>

    <!-- Modal (資源詳情) -->
    <div id="modal-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md hidden animate-fade-in" onclick="closeModal()">
        <div id="modal-content" class="glass-panel w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-2xl border border-cyan-500/40 shadow-[0_0_50px_rgba(0,243,255,0.15)] relative flex flex-col md:flex-row items-stretch animate-scale-in" onclick="event.stopPropagation()">
            
            <!-- 關閉按鈕 -->
            <button onclick="closeModal()" class="absolute top-4 right-4 z-20 p-2 bg-black/50 border border-cyan-500/50 hover:bg-red-500/20 hover:border-red-500 hover:text-red-400 text-cyan-400 rounded-full spring-transition group active:scale-90">
                <i data-lucide="x" class="w-5 h-5 group-hover:rotate-90 transition-transform"></i>
            </button>
            
            <!-- 左側資訊 (星際面板風格) -->
            <div class="w-full md:w-1/2 p-6 md:p-8 flex flex-col justify-between bg-gradient-to-br from-[#080d26] to-[#040612] border-b md:border-b-0 md:border-r border-cyan-900/50 relative overflow-hidden flex-shrink-0">
                <div class="absolute inset-0 cyber-grid opacity-20 pointer-events-none"></div>
                
                <div class="flex flex-col items-center justify-center flex-grow z-10 relative">
                    <!-- 發光裝飾背景 -->
                    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-cyan-500/10 rounded-full blur-[40px] pointer-events-none"></div>
                    
                    <div class="mb-4 md:mb-6 mt-4 w-full h-40 md:h-48 flex items-center justify-center relative flex-shrink-0">
                        <!-- 裝飾邊框 -->
                        <div class="absolute inset-0 border border-cyan-500/20 rounded-xl pointer-events-none"></div>
                        <div class="absolute -top-1 -left-1 w-3 h-3 border-t-2 border-l-2 border-cyan-400 pointer-events-none"></div>
                        <div class="absolute -top-1 -right-1 w-3 h-3 border-t-2 border-r-2 border-cyan-400 pointer-events-none"></div>
                        <div class="absolute -bottom-1 -left-1 w-3 h-3 border-b-2 border-l-2 border-cyan-400 pointer-events-none"></div>
                        <div class="absolute -bottom-1 -right-1 w-3 h-3 border-b-2 border-r-2 border-cyan-400 pointer-events-none"></div>
                        
                        <div id="modal-image-container" class="w-full h-full flex items-center justify-center p-2 z-10"></div>
                    </div>
                    
                    <div class="text-center w-full mb-6 z-10">
                        <div class="flex items-center justify-center gap-2 mb-3">
                            <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
                            <div id="modal-subtitle" class="text-cyan-300 font-tech text-sm tracking-widest uppercase bg-cyan-900/40 border border-cyan-500/30 px-3 py-1 rounded"></div>
                        </div>
                        <h2 id="modal-title" class="text-2xl md:text-3xl font-black text-white tracking-tight text-shadow-sm"></h2>
                    </div>
                </div>
                
                <!-- 對齊附圖的 Cyberpunk 掃描玻璃面板按鈕 -->
                <div class="cyber-btn-wrapper mt-6 md:mt-auto flex-shrink-0 spring-transition active:scale-[0.97] cursor-pointer" onclick="document.getElementById('modal-link-btn').click();">
                    <a id="modal-link-btn" href="#" target="_blank" rel="noopener noreferrer" class="cyber-btn-inner group">
                        <!-- 內部光效與裝飾 -->
                        <div class="cyber-btn-sweep"></div>
                        <div class="cyber-btn-dec-tl group-hover:bg-white transition-colors"></div>
                        <div class="cyber-btn-dec-br group-hover:bg-white transition-colors"></div>
                        
                        <i data-lucide="rocket" class="w-5 h-5 mr-3 group-hover:scale-110 group-hover:-translate-y-1 group-hover:text-cyan-200 transition-all relative z-10"></i>
                        <span class="relative z-10 tracking-[0.2em] font-tech font-bold text-lg">啟動遊戲</span>
                    </a>
                </div>
            </div>

            <!-- 右側 QR Code -->
            <div class="w-full md:w-1/2 p-8 flex flex-col justify-between bg-[#0b1021] gap-6 relative">
                <!-- 裝飾線條 -->
                <div class="absolute top-0 right-8 w-px h-16 bg-gradient-to-b from-cyan-500/50 to-transparent"></div>
                
                <div class="flex flex-col items-center justify-center flex-grow">
                    <p class="text-cyan-500/70 font-tech text-xs mb-4 tracking-widest uppercase"><i data-lucide="scan" class="w-3 h-3 inline mr-1"></i>掃描遊玩</p>
                    
                    <div class="group bg-white p-3 rounded-xl relative cursor-zoom-in spring-transition hover:shadow-[0_0_30px_rgba(188,19,254,0.4)] hover:scale-[1.02] active:scale-[0.98]" onclick="toggleFullQr()">
                        <!-- 科技感掃描外框 -->
                        <div class="absolute -inset-2 border-2 border-purple-500/30 rounded-2xl pointer-events-none group-hover:border-purple-400 transition-colors"></div>
                        <div class="absolute -top-3 -left-3 w-6 h-6 border-t-2 border-l-2 border-purple-400 rounded-tl-xl"></div>
                        <div class="absolute -top-3 -right-3 w-6 h-6 border-t-2 border-r-2 border-purple-400 rounded-tr-xl"></div>
                        <div class="absolute -bottom-3 -left-3 w-6 h-6 border-b-2 border-l-2 border-purple-400 rounded-bl-xl"></div>
                        <div class="absolute -bottom-3 -right-3 w-6 h-6 border-b-2 border-r-2 border-purple-400 rounded-br-xl"></div>
                        
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/60 rounded-xl z-10 backdrop-blur-sm">
                            <i data-lucide="zoom-in" class="w-10 h-10 text-white drop-shadow-lg"></i>
                        </div>
                        <img id="modal-qr-img" src="" alt="QR Code" class="w-48 h-48 md:w-56 md:h-56 object-contain relative z-0 rounded-lg">
                    </div>
                    <p class="text-center font-medium mt-6 text-cyan-600 group-hover:text-cyan-400 transition-colors text-sm">點擊放大QR Code</p>
                </div>
                
                <div class="w-full mt-auto">
                    <p class="text-cyan-700 text-xs mb-2 font-tech">遊戲網址：</p>
                    <div class="flex items-center space-x-2 bg-black/50 p-1.5 rounded-lg border border-cyan-900/80">
                        <div id="modal-url-text" class="flex-grow px-3 text-xs md:text-sm text-cyan-300 truncate font-mono"></div>
                        <button onclick="copyUrl()" class="p-2 bg-cyan-950 hover:bg-cyan-800 rounded border border-cyan-800 hover:border-cyan-400 text-cyan-400 spring-transition relative group active:scale-90" title="複製網址">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                            <span id="copy-tooltip" class="absolute -top-10 left-1/2 transform -translate-x-1/2 bg-cyan-500 text-black text-xs py-1 px-2 rounded font-bold whitespace-nowrap hidden shadow-[0_0_10px_rgba(0,243,255,0.8)] before:content-[''] before:absolute before:-bottom-1 before:left-1/2 before:-translate-x-1/2 before:border-4 before:border-transparent before:border-t-cyan-500">複製成功！</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Full Screen QR -->
    <div id="full-qr-overlay" class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/90 backdrop-blur-lg hidden animate-fade-in" onclick="toggleFullQr()">
        <div class="relative bg-white/5 p-8 rounded-3xl border border-cyan-500/30 animate-scale-in max-w-[90vw] max-h-[90vh] glass-panel shadow-[0_0_100px_rgba(0,243,255,0.2)]" onclick="event.stopPropagation()">
            <button onclick="toggleFullQr()" class="absolute -top-4 -right-4 z-10 p-2 bg-black border border-cyan-500 hover:bg-cyan-950 hover:border-cyan-300 text-cyan-400 rounded-full spring-transition shadow-[0_0_15px_rgba(0,243,255,0.3)] active:scale-90">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <div class="flex flex-col items-center">
                <div class="flex items-center gap-3 mb-6">
                    <i data-lucide="satellite" class="w-6 h-6 text-cyan-400"></i>
                    <h3 id="full-qr-title" class="text-xl md:text-2xl font-bold text-white tracking-wide"></h3>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-2xl relative">
                    <!-- 掃描線動畫 -->
                    <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-cyan-400 to-transparent opacity-50 shadow-[0_0_10px_rgba(0,243,255,0.8)] animate-[scan_2s_ease-in-out_infinite]"></div>
                    <img id="full-qr-img" src="" alt="QR Code Full" class="w-full h-auto max-w-sm max-h-[60vh] object-contain rounded">
                </div>
                <p class="mt-6 text-cyan-300/80 font-tech tracking-widest text-sm bg-cyan-900/30 px-4 py-1.5 rounded-full border border-cyan-800">請掃描QR Code</p>
            </div>
        </div>
        <style>
            @keyframes scan {
                0% { top: 0; opacity: 0; }
                10% { opacity: 1; }
                90% { opacity: 1; }
                100% { top: 100%; opacity: 0; }
            }
        </style>
    </div>

    <script>
        // =========================================================================
        // 資料預覽測試用 (目前已替換為假資料以便預覽效果，部署時請改回 {{DATA_FROM_GOOGLE_SHEET}})
        // =========================================================================
        const resources = [
            { 
                grade: "1上", 
                title: "比多少", 
                subTitle: "10以內兩量的大小比較", 
                image: "moon_usagi_kage.png", 
                url: "https://twebsite.hle.com.tw/ema/aigame/111/index.html" 
            },
			{ 
                grade: "1上", 
                title: "湊10配對", 
                subTitle: "10以內的加法", 
                image: "moon_usagi_kage.png", 
                url: "https://twebsite.hle.com.tw/ema/aigame/112/index.html" 
            },
            { 
                grade: "1下", 
                title: "搶地遊戲", 
                subTitle: "20以內的加減", 
                image: "moon_usagi_kage.png", 
                url: "https://twebsite.hle.com.tw/ema/aigame/121/index.html" 
            },
			{ 
                grade: "1下", 
                title: "翻翻樂", 
                subTitle: "錢幣的換算", 
                image: "moon_usagi_kage.png", 
                url: "https://twebsite.hle.com.tw/ema/aigame/122/index.html" 
            },
			{ 
                grade: "2上", 
                title: "烏龜快跑", 
                subTitle: "認識公分", 
                image: "moon_usagi_kage.png", 
                url: "https://twebsite.hle.com.tw/ema/aigame/211/index.html" 
            },
			{ 
                grade: "2上", 
                title: "乘法賓果", 
                subTitle: "乘法", 
                image: "moon_usagi_kage.png", 
                url: "https://twebsite.hle.com.tw/ema/aigame/212/index.html" 
            },
			{ 
                grade: "2下", 
                title: "比大小", 
                subTitle: "兩數比大小", 
                image: "moon_usagi_kage.png", 
                url: "https://twebsite.hle.com.tw/ema/aigame/221/index.html" 
            },
			{ 
                grade: "2下", 
                title: "乘法對對樂", 
                subTitle: "乘法", 
                image: "moon_usagi_kage.png", 
                url: "https://twebsite.hle.com.tw/ema/aigame/222/index.html" 
            }			
        ];

        const GRADES = ["全部", "1上", "1下", "2上", "2下"];
        let selectedGrade = "全部"; 
        let searchTerm = "";
        let currentModalResource = null;

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            
            renderGrades();
            renderResources();
            lucide.createIcons();

            document.getElementById('search-input').addEventListener('input', (e) => {
                searchTerm = e.target.value;
                handleSearch();
            });

            document.getElementById('clear-search').addEventListener('click', () => {
                searchTerm = "";
                document.getElementById('search-input').value = "";
                handleSearch();
            });

            window.addEventListener('scroll', handleScroll);
            document.getElementById('scroll-to-top').addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        function renderGrades() {
            const container = document.getElementById('grade-buttons');
            container.innerHTML = '';
            GRADES.forEach(grade => {
                const btn = document.createElement('button');
                const isActive = (selectedGrade === grade && !searchTerm);
                
                // 科技感按鈕樣式，加入 spring-transition 與 active:scale-90 點擊回饋
                let classes = "px-4 py-1.5 rounded-full border text-sm font-bold font-tech spring-transition relative overflow-hidden group active:scale-90 ";
                
                if(isActive) {
                    classes += "bg-cyan-900/60 border-cyan-400 text-cyan-300 neon-border-active shadow-[0_0_15px_rgba(0,243,255,0.4)]";
                } else {
                    classes += "bg-transparent border-cyan-800/50 text-cyan-600/70 hover:border-cyan-500/80 hover:text-cyan-400 hover:bg-cyan-950/40 hover:shadow-[0_0_10px_rgba(0,243,255,0.2)] hover:-translate-y-0.5";
                }
                
                btn.className = classes;
                btn.innerHTML = `
                    <span class="relative z-10 flex items-center gap-1.5">
                        ${isActive ? '<span class="w-1.5 h-1.5 rounded-full bg-cyan-300 animate-pulse"></span>' : ''}
                        ${grade}
                    </span>
                    <div class="absolute inset-0 bg-gradient-to-r from-cyan-600/20 to-transparent translate-x-[-100%] group-hover:translate-x-0 transition-transform duration-300"></div>
                `;
                
                btn.onclick = () => {
                    selectedGrade = grade;
                    searchTerm = ""; 
                    document.getElementById('search-input').value = "";
                    handleSearch(); 
                    renderGrades();
                };
                container.appendChild(btn);
            });
        }

        function handleSearch() {
            const clearBtn = document.getElementById('clear-search');
            const hint = document.getElementById('search-result-hint');
            const termDisplay = document.getElementById('search-term-display');

            if (searchTerm.trim() !== "") {
                clearBtn.classList.remove('hidden');
                hint.classList.remove('hidden');
                termDisplay.textContent = searchTerm;
                renderGrades();
            } else {
                clearBtn.classList.add('hidden');
                hint.classList.add('hidden');
                renderGrades();
            }
            renderResources();
        }

        function renderResources() {
            const container = document.getElementById('resources-grid');
            const noData = document.getElementById('no-data-hint');
            container.innerHTML = '';

            const filtered = resources.filter(r => {
                if (searchTerm.trim() !== "") {
                    const lowerTerm = searchTerm.toLowerCase();
                    return r.title.toLowerCase().includes(lowerTerm) || 
                           r.subTitle.toLowerCase().includes(lowerTerm);
                }
                return selectedGrade === "全部" || r.grade === selectedGrade;
            });

            if (filtered.length === 0) {
                noData.classList.remove('hidden');
                document.getElementById('no-data-text').textContent = searchTerm 
                    ? `雷達未掃描到與「${searchTerm}」相關的節點` 
                    : `星域 ${selectedGrade} 目前尚無探測資料`;
            } else {
                noData.classList.add('hidden');
                filtered.forEach(res => {
                    const card = createCard(res);
                    container.appendChild(card);
                });
                lucide.createIcons();
            }
        }

        function createCard(res) {
            const div = document.createElement('div');
            // 玻璃擬態科技卡片，加入彈性過渡 (spring-transition)、懸浮放大與點擊內縮 (active:scale-[0.97])
            div.className = "glass-panel group relative overflow-hidden rounded-2xl cursor-pointer spring-transition hover:-translate-y-3 hover:scale-[1.02] hover:shadow-[0_15px_40px_rgba(0,243,255,0.25)] hover:border-cyan-400/60 active:scale-[0.97] flex flex-col h-full";
            div.onclick = () => openModal(res);

            // 頂部發光飾條
            const topBarHtml = `<div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-cyan-600 via-purple-500 to-cyan-600 opacity-50 group-hover:opacity-100 transition-opacity"></div>`;

            let imageHtml = '';
            if (res.image) {
                imageHtml = `<img src="${res.image}" alt="${res.title}" class="w-full h-full object-cover relative z-10 opacity-70 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500" onerror="this.parentNode.innerHTML='<div class=\\'flex flex-col items-center justify-center text-cyan-700/50 h-full\\'><i data-lucide=\\'image-off\\' class=\\'w-12 h-12 mb-2\\'></i><span class=\\'text-xs font-tech tracking-widest\\'>NO IMAGE</span></div>'; lucide.createIcons();">`;
            } else {
                imageHtml = `
                    <div class="flex flex-col items-center justify-center text-cyan-800/60 h-full relative z-10 group-hover:text-cyan-600 transition-colors">
                        <i data-lucide="hexagon" class="w-16 h-16 mb-2 stroke-1 opacity-50 absolute animate-pulse"></i>
                        <i data-lucide="component" class="w-8 h-8 mb-2 z-10"></i>
                        <span class="text-xs font-tech tracking-widest z-10">NO IMAGE</span>
                    </div>
                `;
            }

            const gradeBadge = searchTerm ? `<span class="absolute top-3 left-3 z-20 text-xs font-tech bg-cyan-950/80 border border-cyan-500/50 text-cyan-300 px-2 py-1 rounded backdrop-blur-sm shadow-[0_0_10px_rgba(0,243,255,0.2)]">${res.grade}</span>` : '';

            div.innerHTML = `
                ${topBarHtml}
                <div class="h-48 bg-[#020308] relative flex items-center justify-center border-b border-cyan-900/50 overflow-hidden">
                    <div class="absolute inset-0 cyber-grid opacity-30 z-0"></div>
                    ${gradeBadge}
                    ${imageHtml}
                    <!-- 懸浮查看按鈕效果 -->
                    <div class="absolute inset-0 bg-cyan-900/40 backdrop-blur-[2px] opacity-0 group-hover:opacity-100 transition-all duration-300 z-20 flex items-center justify-center">
                        <div class="bg-black/60 border border-cyan-400 text-cyan-300 px-4 py-2 rounded-full font-tech text-sm transform translate-y-6 group-hover:translate-y-0 spring-transition shadow-[0_0_15px_rgba(0,243,255,0.5)] flex items-center gap-2">
                            <i data-lucide="scan-line" class="w-4 h-4"></i> 讀取資料
                        </div>
                    </div>
                </div>
                <div class="p-5 flex-grow flex flex-col relative z-10 bg-gradient-to-b from-[#0a0d1d]/80 to-[#050714]/90">
                    <div class="mb-auto">
                        <div class="inline-block px-2.5 py-1 border border-purple-500/30 rounded text-xs font-tech text-purple-300 bg-purple-900/20 mb-3 tracking-wider">
                            ${res.subTitle}
                        </div>
                        <h3 class="text-lg font-bold text-gray-100 group-hover:text-cyan-300 transition-colors leading-snug">${res.title}</h3>
                    </div>
                    
                    <div class="mt-4 pt-4 border-t border-cyan-900/50 flex items-center justify-between text-cyan-600/60">
                        <div class="flex items-center gap-1 text-xs font-tech">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_5px_#22c55e]"></span> ONLINE
                        </div>
                        <i data-lucide="qr-code" class="w-5 h-5 group-hover:text-cyan-400 transition-colors"></i>
                    </div>
                </div>
            `;
            return div;
        }

        function openModal(res) {
            currentModalResource = res;
            const modal = document.getElementById('modal-overlay');
            const imgContainer = document.getElementById('modal-image-container');
            const title = document.getElementById('modal-title');
            const subTitle = document.getElementById('modal-subtitle');
            const linkBtn = document.getElementById('modal-link-btn');
            const qrImg = document.getElementById('modal-qr-img');
            const urlText = document.getElementById('modal-url-text');
            const fullQrImg = document.getElementById('full-qr-img');
            const fullQrTitle = document.getElementById('full-qr-title');

            title.textContent = res.title;
            subTitle.textContent = res.subTitle;
            linkBtn.href = res.url;
            urlText.textContent = res.url;

            // Modal 圖片處理 (未來風格相框)
            if (res.image) {
                imgContainer.innerHTML = `<img src="${res.image}" class="max-w-full max-h-full object-contain rounded drop-shadow-[0_0_15px_rgba(0,243,255,0.2)]" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');">
                                          <div class="hidden flex flex-col items-center justify-center text-cyan-700/50"><i data-lucide="image-off" class="w-12 h-12 mb-2"></i><span class="font-tech text-sm tracking-widest">NO IMAGE DATA</span></div>`;
            } else {
                imgContainer.innerHTML = `<div class="flex flex-col items-center justify-center text-cyan-700/50"><i data-lucide="box" class="w-12 h-12 mb-2 opacity-50"></i><span class="font-tech text-sm tracking-widest">NO IMAGE DATA</span></div>`;
            }

            // QR Code 產生
            const qrBase = "https://api.qrserver.com/v1/create-qr-code/";
            const qrSize = "?size=400x400";
            const qrData = "&data=" + encodeURIComponent(res.url);
            const qrUrl = qrBase + qrSize + qrData;
            
            qrImg.src = qrUrl;
            fullQrImg.src = qrUrl;
            fullQrTitle.textContent = res.title;

            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
            currentModalResource = null;
        }

        function toggleFullQr() {
            const overlay = document.getElementById('full-qr-overlay');
            if (overlay.classList.contains('hidden')) {
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
            }
        }

        function copyUrl() {
            if (!currentModalResource) return;
            navigator.clipboard.writeText(currentModalResource.url).then(() => {
                const tooltip = document.getElementById('copy-tooltip');
                tooltip.classList.remove('hidden');
                setTimeout(() => tooltip.classList.add('hidden'), 2000);
            });
        }

        function handleScroll() {
            const btn = document.getElementById('scroll-to-top');
            if (window.scrollY > 300) {
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
